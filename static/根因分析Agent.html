<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>根因分析Agent</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --primary: #2979ff;
    --primary-dark: #1565c0;
    --primary-light: #82b1ff;
    --bg: #e3f2fd;
    --card: #ffffff;
    --text: #2d3436;
    --text2: #636e72;
    --text3: #b2bec3;
    --red: #e74c3c;
    --green: #00b894;
    --orange: #e67e22;
    --blue: #3498db;
    --yellow: #f1c40f;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    min-height:100vh; padding-bottom: 80px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    padding: 20px 16px 28px;
    color: #fff;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  /* Input Section */
  .input-section { padding: 16px; }
  .input-card {
    background: var(--card); border-radius: 12px;
    padding: 16px; box-shadow: var(--shadow);
  }
  .input-card textarea {
    width:100%; min-height: 90px; border: none;
    font-size: 15px; line-height: 1.6; resize: none;
    outline: none; font-family: inherit; color: var(--text);
  }
  .input-card textarea::placeholder { color: var(--text3); }
  .input-actions {
    display:flex; gap: 10px; margin-top: 12px;
  }
  .btn {
    flex:1; padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all .2s; font-family: inherit; text-align: center;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; box-shadow: 0 2px 8px rgba(124,77,255,0.3);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: #f0f0f5; color: var(--text2);
  }
  .btn-secondary:active { background: #e8e8ed; }
  .btn:disabled { opacity: 0.5; pointer-events: none; }

  /* API Config */
  .api-toggle {
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 16px; background: var(--card);
    margin: 0 16px 12px; border-radius: 10px;
    box-shadow: var(--shadow); font-size: 14px;
    color: var(--text2); cursor: pointer;
  }
  .api-toggle .arrow { transition: transform .3s; }
  .api-toggle.open .arrow { transform: rotate(180deg); }
  .api-panel { display: none; padding: 0 16px 16px; }
  .api-panel.open { display: block; }
  .api-panel input, .api-panel select {
    width:100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid #e0e0e0; background: var(--card);
    font-size: 14px; margin-bottom: 10px; outline: none;
    font-family: inherit;
  }

  /* Markdown Table Styles */
  .modal-body table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--card);
    border-radius: 8px;
    overflow: hidden;
    margin: 12px 0;
  }
  .modal-body table th {
    background: var(--primary-light);
    color: var(--primary-dark);
    font-weight: 700;
    padding: 10px 8px;
    text-align: left;
    vertical-align: top;
  }
  .modal-body table td {
    padding: 8px;
    border-bottom: 1px solid #f0f0f0;
    text-align: left;
    vertical-align: top;
    line-height: 1.5;
  }
  .modal-body table tr:last-child td {
    border-bottom: none;
  }

  /* Section Title */
  .section-title {
    display:flex; align-items:center; gap: 8px;
    padding: 20px 16px 12px; font-size: 16px; font-weight: 700;
    color: var(--text);
  }
  .section-title .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red);
  }

  /* Root Cause Cards */
  .rc-list { padding: 0 16px; }
  .rc-card {
    background: var(--card); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
    box-shadow: var(--shadow); transition: all .2s;
  }
  .rc-card:active { transform: scale(0.99); }
  .rc-card.selected {
    border: 2px solid var(--primary);
    box-shadow: 0 2px 12px rgba(124,77,255,0.15);
  }
  .rc-card.pruned { opacity: 0.6; }
  .rc-header { display:flex; align-items:flex-start; gap: 10px; }
  .rc-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; font-size: 13px; font-weight: 700;
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .rc-num.golden { background: linear-gradient(135deg, #f39c12, #e67e22); }
  .rc-num.pruned { background: var(--text3); }
  .rc-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .rc-desc { font-size: 13px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
  .rc-chain { display:flex; align-items:center; gap: 6px; margin-top: 10px; font-size: 12px; }
  .rc-chain .cause { color: var(--blue); }
  .rc-chain .arrow { color: var(--text3); }
  .rc-chain .effect { color: var(--red); }
  .rc-score { display:flex; align-items:center; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--text3); }
  .score-bar { flex:1; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--green), var(--primary)); }
  .score-fill.low { background: linear-gradient(90deg, var(--red), var(--orange)); }

  /* Expandable Detail */
  .rc-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
  .rc-detail.open { display: block; }
  .detail-step { display:flex; gap: 10px; margin-bottom: 14px; }
  .detail-step:last-child { margin-bottom: 0; }
  .step-icon {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--primary-light); color: var(--primary-dark);
    font-size: 11px; font-weight: 700; display:flex; align-items:center; justify-content:center; flex-shrink: 0;
  }
  .step-content { flex: 1; }
  .step-label { font-size: 12px; color: var(--primary); font-weight: 600; }
  .step-text { font-size: 13px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

  /* Contradiction Card */
  .contradiction-card {
    background: linear-gradient(135deg, #fff5f5, #fff0f0);
    border: 1px solid #ffe0e0; border-radius: 12px;
    padding: 16px; margin: 0 16px 16px;
  }
  .contradiction-card h3 { font-size: 14px; color: var(--red); margin-bottom: 10px; display:flex; align-items:center; gap: 6px; }
  .contradiction-item { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
  .contradiction-item:last-child { margin-bottom: 0; }
  .contradiction-item .label { font-weight: 700; color: var(--text); }
  .contradiction-item .text { color: var(--text2); margin-top: 2px; }

  /* Opportunity Cards */
  .opp-list { padding: 0 16px; }
  .opp-card {
    background: linear-gradient(135deg, #f8f9ff, #f0f2ff);
    border: 1px solid #e0e4ff; border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .opp-card h4 { font-size: 14px; color: var(--primary-dark); margin-bottom: 8px; display:flex; align-items:center; gap: 6px; }
  .opp-principle { display:inline-block; background: var(--primary-light); color: var(--primary-dark); font-size: 12px; padding: 4px 10px; border-radius: 20px; margin-bottom: 10px; }
  .opp-fos-source { display:inline-block; background: #e3f2fd; color: var(--blue); font-size: 12px; padding: 4px 10px; border-radius: 20px; margin-bottom: 10px; margin-left: 6px; }
  .opp-solution { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .opp-solution strong { color: var(--text); }
  .opp-compliance { font-size: 12px; color: var(--orange); margin-top: 10px; padding: 10px; background: #fff8f0; border-radius: 8px; line-height: 1.5; border-left: 3px solid var(--orange); }

  /* FOS Card */
  .fos-card {
    background: linear-gradient(135deg, #f0f8ff, #e8f4fd);
    border: 1px solid #d0e8f8; border-radius: 12px;
    padding: 16px; margin: 0 16px 16px;
  }
  .fos-card h3 { font-size: 14px; color: var(--blue); margin-bottom: 10px; display:flex; align-items:center; gap: 6px; }
  .fos-abstract { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
  .fos-abstract .label { font-weight: 700; color: var(--blue); }
  .fos-bridge { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
  .fos-bridge:last-child { margin-bottom: 0; }
  .fos-bridge .industry { font-weight: 700; color: var(--primary-dark); }
  .fos-bridge .tech { color: var(--text2); margin-top: 4px; }

  /* RPV Card */
  .rpv-card {
    background: linear-gradient(135deg, #fff5f5, #ffe8e8);
    border: 1px solid #ffd0d0; border-radius: 12px;
    padding: 16px; margin: 0 16px 16px;
  }
  .rpv-card h3 { font-size: 14px; color: var(--red); margin-bottom: 10px; display:flex; align-items:center; gap: 6px; }
  .rpv-item { background: var(--card); border-radius: 8px; padding: 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
  .rpv-item:last-child { margin-bottom: 0; }
  .rpv-item .rpv-label { font-weight: 700; color: var(--red); font-size: 12px; }
  .rpv-item .rpv-text { color: var(--text2); margin-top: 4px; }
  .rpv-blindspot { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 13px; line-height: 1.5; color: #2e7d32; border-left: 3px solid var(--green); }

  /* History List */
  .history-list { padding: 0 16px; }
  .history-card {
    background: var(--card); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
    box-shadow: var(--shadow); position: relative;
  }
  .history-card .star-btn {
    position: absolute; top: 12px; right: 12px;
    font-size: 20px; cursor: pointer; color: var(--text3);
    background: none; border: none; padding: 4px;
  }
  .history-card .star-btn.starred { color: var(--yellow); }
  .history-title { font-size: 15px; font-weight: 700; color: var(--text); padding-right: 30px; }
  .history-date { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .history-preview { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
  .history-actions { display:flex; gap: 8px; margin-top: 12px; }
  .history-actions .btn { padding: 8px 16px; font-size: 13px; flex: none; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); padding: 8px 0 20px;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    display:flex; justify-content: space-around; z-index: 100;
  }
  .nav-item {
    display:flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 4px 16px; cursor: pointer;
    color: var(--text3); font-size: 11px; border: none; background: none;
    font-family: inherit;
  }
  .nav-item .nav-icon { font-size: 22px; }
  .nav-item.active { color: var(--primary); }

  /* Loading */
  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.9); z-index: 200;
    flex-direction: column; align-items:center; justify-content:center;
  }
  .loading-overlay.active { display: flex; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid #f0f0f0; border-top-color: var(--primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { margin-top: 16px; font-size: 14px; color: var(--text2); }

  /* Report Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 300;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: var(--card); width: 100%; max-height: 85vh;
    border-radius: 20px 20px 0 0; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
  }
  .modal-header h3 { font-size: 16px; }
  .modal-close { font-size: 24px; color: var(--text3); cursor: pointer; }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.8; color: var(--text2); }
  .modal-footer { padding: 12px 20px 24px; border-top: 1px solid #f0f0f0; }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* Empty State */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* Scrollbar hide */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>根因分析Agent</h1>
  <p>输入问题，智能定位根因与解决方案</p>
</div>

<!-- ===== PAGE: HOME ===== -->
<div class="page active" id="pageHome">
  <!-- Input -->
  <div class="input-section" id="inputSection">
    <div class="input-card">
      <textarea id="problemInput" placeholder="描述您的商业痛点，例如：销售额持续下降、用户留存率低、生产效率低下..."></textarea>
      <div class="input-actions">
        <button class="btn btn-secondary" onclick="loadExample()">示例</button>
        <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalysis()">开始分析</button>
      </div>
    </div>
  </div>

</div>
<!-- Result Page -->
  <div class="page" id="pageResult">
    <div class="section-title">
      <div class="dot" style="background: var(--green);"></div>
      <span>AI 深度分析结果</span>
    </div>
    <div style="padding: 16px; text-align: center; color: var(--text2);">
      <p style="font-size: 14px; line-height: 1.6;">分析结果将在弹窗中显示。</p>
      <p style="font-size: 13px; margin-top: 8px;">分析完成后可点击"📝 保存到 Notion"留存报告。</p>
    </div>
  </div>

<!-- ===== PAGE: HISTORY ===== -->
<div class="page" id="pageHistory">
  <div class="section-title">
    <div class="dot" style="background: var(--blue);"></div>
    <span>历史报告</span>
    <span style="margin-left:auto; font-size: 13px; color: var(--text3); cursor: pointer;" onclick="clearAllHistory()">清空</span>
  </div>
  <div class="history-list" id="historyList"></div>
  <div class="empty-state" id="historyEmpty" style="display:none;">
    <div style="font-size: 40px;">📭</div>
    <p>暂无历史报告</p>
    <p style="font-size: 12px; margin-top: 4px;">分析报告将自动保存到这里</p>
  </div>
</div>

<!-- ===== PAGE: STARRED ===== -->
<div class="page" id="pageStarred">
  <div class="section-title">
    <div class="dot" style="background: var(--yellow);"></div>
    <span>收藏报告</span>
  </div>
  <div class="history-list" id="starredList"></div>
  <div class="empty-state" id="starredEmpty" style="display:none;">
    <div style="font-size: 40px;">⭐</div>
    <p>暂无收藏</p>
    <p style="font-size: 12px; margin-top: 4px;">点击报告卡片上的星标即可收藏</p>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">正在分析...</div>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal" onclick="closeModal(event)">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📊 分析报告</h3>
      <span class="modal-close" onclick="closeModalDirect()">&times;</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" style="display:flex;gap:8px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="copyReport()">复制报告</button>
      <button class="btn btn-primary" style="flex:1;" id="saveToNotionBtn" onclick="saveToNotion()">📝 保存到 Notion</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="switchPage('home')" id="navHome">
    <span class="nav-icon">🏠</span>
    <span>首页</span>
  </button>
  <button class="nav-item" onclick="switchPage('history')" id="navHistory">
    <span class="nav-icon">📋</span>
    <span>历史</span>
  </button>
  <button class="nav-item" onclick="switchPage('starred')" id="navStarred">
    <span class="nav-icon">⭐</span>
    <span>收藏</span>
  </button>
</div>

<script>
// ===== State =====
let currentProblem = '';
let currentPage = 'home';

// ===== localStorage Helpers =====
const STORAGE_KEY = 'rootcause_reports';
let storageAvailable = false;
try {
  const test = '__test__';
  localStorage.setItem(test, test);
  localStorage.removeItem(test);
  storageAvailable = true;
} catch(e) {
  console.warn('localStorage不可用，历史记录将无法保存');
}
function getReports() {
  if (!storageAvailable) return [];
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveReports(reports) {
  if (!storageAvailable) { console.warn('localStorage不可用，无法保存'); return; }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(reports)); } catch(e) {
    console.error('保存失败:', e);
    alert('保存失败：存储空间可能已满');
  }
}
function addReport(report) {
  const reports = getReports();
  reports.unshift(report);
  saveReports(reports);
}
function deleteReport(id) {
  const reports = getReports().filter(r => r.id !== id);
  saveReports(reports);
  renderHistory();
  renderStarred();
}
function toggleStar(id) {
  const reports = getReports();
  const r = reports.find(x => x.id === id);
  if (r) { r.starred = !r.starred; saveReports(reports); }
  renderHistory();
  renderStarred();
}
function clearAllHistory() {
  if (confirm('确定清空所有历史报告吗？')) {
    saveReports([]);
    renderHistory();
    renderStarred();
  }
}

// ===== Page Navigation =====
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  if (page === 'home') {
    document.getElementById('pageHome').classList.add('active');
    document.getElementById('navHome').classList.add('active');
  } else if (page === 'result') {
    document.getElementById('pageResult').classList.add('active');
    document.getElementById('navHome').classList.add('active');
  } else if (page === 'history') {
    document.getElementById('pageHistory').classList.add('active');
    document.getElementById('navHistory').classList.add('active');
    renderHistory();
  } else if (page === 'starred') {
    document.getElementById('pageStarred').classList.add('active');
    document.getElementById('navStarred').classList.add('active');
    renderStarred();
  }
}

// ===== Load Example =====
const examples = [
  '销售额持续下降，客户流失严重',
  '餐饮食材损耗率高达30%，供应链效率低',
  '中小企业买了SaaS但员工不用，系统成摆设',
  '社区养老服务找不到老人真正需要的服务',
  '制造业招工难，自动化设备又贵又不灵活',
  '在线教育完课率不到10%，用户买了课不看'
];
let exIdx = 0;
function loadExample() {
  document.getElementById('problemInput').value = examples[exIdx % examples.length];
  exIdx++;
}

// ===== Start Analysis =====
async function startAnalysis() {
  const problem = document.getElementById('problemInput').value.trim();
  if (!problem) { alert('请输入商业痛点'); return; }
  await startAiAnalysis(problem);
}

// ===== AI Analysis =====
async function startAiAnalysis(problem) {
  showLoading('正在进行AI深度分析...');

  const backendUrl = (window._rcBackendUrl || '').replace(/\/+$/, '');

  try {
    openModal('<div class="loading"><div class="loading-spinner"></div><p>AI分析中...</p></div>');
    hideLoading();

    const response = await fetch(backendUrl + '/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ problem })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || '分析请求失败 (' + response.status + ')');
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    const modalBody = document.getElementById('modalBody');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('data:')) {
          try {
            const data = JSON.parse(trimmed.slice(5).trim());
            if (data.delta) {
              fullText += data.delta;
              modalBody.innerHTML = formatMarkdown(fullText);
              modalBody.scrollTop = modalBody.scrollHeight;
            }
          } catch(e) { /* ignore parse errors */ }
        }
      }
    }

    // Save full report for Notion save
    window._currentReportMarkdown = fullText;
    window._currentReportTitle = problem;

  } catch (err) {
    hideLoading();
    if (err.name === 'AbortError') {
      alert('AI分析超时：请求超时未响应\n\n请检查网络连接或稍后重试。');
    } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
      alert('网络请求失败：\n\n1. 请检查后端服务是否运行\n2. 请检查后端地址配置是否正确');
    } else {
      alert('AI分析失败：' + err.message);
    }
  }
}

// ===== Save to Notion =====
async function saveToNotion() {
  const markdown = window._currentReportMarkdown;
  const title = window._currentReportTitle;
  const backendUrl = (window._rcBackendUrl || '').replace(/\/+$/, '');

  if (!markdown) {
    alert('请先进行分析');
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN', { hour12: false });
  const notionTitle = (title || '根因分析报告') + ' - ' + dateStr;

  const btn = document.getElementById('saveToNotionBtn');
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.textContent = '⏳ 保存中...'; btn.disabled = true; }

  try {
    const response = await fetch(backendUrl + '/save-to-notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: notionTitle, markdown })
    });

    const result = await response.json();

    if (result.success) {
      if (btn) btn.textContent = '✅ 已保存';
      setTimeout(function() {
        if (btn) { btn.textContent = origText; btn.disabled = false; }
      }, 2000);
    } else {
      if (btn) { btn.textContent = origText; btn.disabled = false; }
      alert('❌ 保存失败：' + (result.error || '未知错误'));
    }
  } catch (err) {
    if (btn) { btn.textContent = origText; btn.disabled = false; }
    alert('❌ 网络错误：' + err.message);
  }
}

// Legacy - Save Report (now uses Notion)
function saveCurrentReport() {
  if (!window._currentReportMarkdown) { alert('请先进行分析'); return; }
  saveToNotion();
}

// ===== Render History =====
function renderHistory() {
  const reports = getReports();
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');

  if (!list || !empty) {
    console.error('historyList or historyEmpty element not found');
    return;
  }

  if (reports.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = '';
  reports.forEach(r => {
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerHTML = `
      <button class="star-btn ${r.starred ? 'starred' : ''}" onclick="event.stopPropagation(); toggleStar('${r.id}')">
        ${r.starred ? '⭐' : '☆'}
      </button>
      <div class="history-title">${escapeHtml(r.problem)}</div>
      <div class="history-date">${r.date}</div>
      <div class="history-preview">
        🔑 黄金根因：${escapeHtml(r.goldenCause)}<br>
        ⚡ 矛盾参数：${escapeHtml(r.contradiction)}<br>
        🚀 机会数：${r.opportunities.length}
      </div>
      <div class="history-actions">
        <button class="btn btn-secondary" onclick="viewReport('${r.id}')">查看</button>
        <button class="btn btn-primary" onclick="exportHistoryReport('${r.id}')">导出</button>
        <button class="btn btn-secondary" style="color:var(--red);" onclick="deleteReport('${r.id}')">删除</button>
      </div>
    `;
    list.appendChild(card);
  });
}

// ===== View Report =====
function viewReport(id) {
  const r = getReports().find(x => x.id === id);
  if (!r) return;

// ===== Export History Report =====
function exportHistoryReport(id) {
  const r = getReports().find(x => x.id === id);
  if (!r) return;

  let report = `📊 根因分析报告\n\n`;
  report += `问题：${r.problem}\n`;
  report += `时间：${r.date}\n`;
  report += `黄金根因：${r.goldenCause}\n`;
  report += `矛盾参数：${r.contradiction}\n`;
  report += `机会数：${r.opportunities.length}\n\n`;
  report += `⚠️ 注意：本报告为历史摘要，完整分析请使用AI深度分析功能重新生成。\n`;

  const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `根因分析报告_${r.problem.slice(0,20)}_${new Date().getTime()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  alert('报告已下载');
}

// ===== Markdown Formatters =====
function formatMarkdown(text) {
  // 先处理表格（必须在处理其他元素之前，避免与列表冲突）
  let html = text;
  
  // 处理表格：匹配 | 列1 | 列2 | ... | 格式的行（支持 \n 和 <br> 分隔）
  // 先将 <br> 替换为 \n 以便统一处理，处理完后再恢复
  const normalized = html.replace(/<br\s*\/?>/gi, '\n');
  
  const tableRegex = /((?:\|[^\n]*\|\n)+)/g;
  let hasTable = false;
  
  const processed = normalized.replace(tableRegex, function(match) {
    const lines = match.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) return match;
    
    // 检查是否包含分隔行（如 |:---|:---|）
    const hasSeparator = lines.some(l => l.includes(':---') || l.match(/^\|[\s:-]+\|$/));
    if (!hasSeparator && lines.length < 2) return match;
    
    hasTable = true;
    let tableHtml = '<div style="overflow-x:auto;margin:12px 0;"><table style="width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border-radius:8px;overflow:hidden;">';
    let rowIdx = 0;
    
    lines.forEach((line) => {
      // 跳过分隔行 |:---|:---|
      if (line.includes(':---') || line.match(/^\|[\s:-]+\|$/)) return;
      
      const cells = line.split('|').filter(c => c.trim() !== '');
      if (cells.length === 0) return;
      
      const tag = rowIdx === 0 ? 'th' : 'td';
      const bg = rowIdx === 0 ? 'background:var(--primary-light);color:var(--primary-dark);font-weight:700;' : 'border-bottom:1px solid #f0f0f0;';
      const padding = rowIdx === 0 ? 'padding:10px 8px;' : 'padding:8px;';
      
      tableHtml += '<tr>';
      cells.forEach(cell => {
        tableHtml += `<${tag} style="${bg}${padding}text-align:left;vertical-align:top;">${cell.trim()}</${tag}>`;
      });
      tableHtml += '</tr>';
      rowIdx++;
    });
    
    tableHtml += '</table></div>';
    return tableHtml;
  });
  
  // 如果处理了表格，使用处理后的结果；否则使用原始文本
  html = hasTable ? processed : html;
  
  return html
    .replace(/### (.*)/g, '<h3 style="color:var(--primary-dark);margin:16px 0 8px;">$1</h3>')
    .replace(/## (.*)/g, '<h2 style="color:var(--text);margin:20px 0 10px;border-bottom:1px solid #f0f0f0;padding-bottom:8px;">$1</h2>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/- (.*)/g, '<li style="margin:4px 0;">$1</li>')
    .replace(/\n/g, '<br>');
}
function formatSimpleMarkdown(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);">$1</strong>').replace(/\n/g, '<br>');
}
