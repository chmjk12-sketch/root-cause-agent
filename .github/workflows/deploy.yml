name: Deploy
on:
  push:
    branches: [main]
env:
  APP_NAME: root-cause-agent
  APP_PORT: "3003"
  REGISTRY_URL: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67
  ACR_REGION: cn-beijing
  DOMAIN: chmjk67.top
  ECS_IP: 39.105.86.184
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure ACR repository exists
        run: |
          python3 -c "
import urllib.parse, hashlib, hmac, base64, time, uuid, os

ak_id = os.environ['AK_ID']
ak_secret = os.environ['AK_SECRET']
region = os.environ['REGION']
ns = os.environ['NS']
repo = os.environ['REPO_NAME']

def sign(action, **extras):
    params = {
        'Format': 'JSON', 'Version': '2016-06-07',
        'AccessKeyId': ak_id, 'SignatureMethod': 'HMAC-SHA1',
        'Timestamp': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
        'SignatureVersion': '1.0', 'SignatureNonce': str(uuid.uuid4()),
        'Action': action, 'RepoNamespace': ns, 'RepoName': repo,
    }
    params.update(extras)
    sorted_keys = sorted(params)
    canonicalized = '&'.join(f'{urllib.parse.quote_plus(k)}={urllib.parse.quote_plus(str(params[k]))}' for k in sorted_keys)
    string_to_sign = f'GET&{urllib.parse.quote_plus(\"/\")}&{urllib.parse.quote_plus(canonicalized)}'
    sig = base64.b64encode(hmac.new(f'{ak_secret}&'.encode(), string_to_sign.encode(), hashlib.sha1).digest()).decode()
    return f'https://cr.{region}.aliyuncs.com/?{canonicalized}&Signature={urllib.parse.quote_plus(sig)}'

import requests
url = sign('GetRepository')
r = requests.get(url)
if r.status_code == 200 and r.json().get('repo'):
    print('ACR repo exists')
else:
    print('Creating ACR repo...')
    url = sign('CreateRepository', RepoType='PUBLIC', Summary=repo)
    r2 = requests.get(url)
    print(f'Create: {r2.status_code} {r2.json().get(\"IsSuccess\", r2.text[:100])}')
"
        env:
          AK_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          REGION: ${{ env.ACR_REGION }}
          NS: ${{ env.REGISTRY_NAMESPACE }}
          REPO_NAME: ${{ env.APP_NAME }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /opt/app/scripts/deploy.sh \
              --app-name ${{ env.APP_NAME }} \
              --image ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }} \
              --port ${{ env.APP_PORT }} \
              --internal-port 80 \
              --health-path /
            ROUTE_LINE="${{ env.APP_NAME }}.${{ env.DOMAIN }} {"
            if ! grep -qF "$ROUTE_LINE" /opt/app/Caddyfile; then
              sed -i "/^:80 {/i\\${{ env.APP_NAME }}.${{ env.DOMAIN }} {\n  reverse_proxy ${{ env.APP_NAME }}_app:80\n}\n" /opt/app/Caddyfile
              docker exec -w /etc/caddy caddy caddy reload
            fi

      - name: Ensure DNS A record exists
        run: |
          python3 -c "
import urllib.parse, hashlib, hmac, base64, time, uuid, os

ak_id = os.environ['AK_ID']
ak_secret = os.environ['AK_SECRET']
domain = os.environ['DOMAIN']
rr = os.environ['RR']
value = os.environ['VALUE']

def sign(action, **extras):
    params = {
        'Format': 'JSON', 'Version': '2015-01-09',
        'AccessKeyId': ak_id, 'SignatureMethod': 'HMAC-SHA1',
        'Timestamp': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
        'SignatureVersion': '1.0', 'SignatureNonce': str(uuid.uuid4()),
        'Action': action, 'DomainName': domain,
    }
    params.update(extras)
    sorted_keys = sorted(params)
    canonicalized = '&'.join(f'{urllib.parse.quote_plus(k)}={urllib.parse.quote_plus(str(params[k]))}' for k in sorted_keys)
    string_to_sign = f'GET&{urllib.parse.quote_plus(\"/\")}&{urllib.parse.quote_plus(canonicalized)}'
    sig = base64.b64encode(hmac.new(f'{ak_secret}&'.encode(), string_to_sign.encode(), hashlib.sha1).digest()).decode()
    return f'https://alidns.aliyuncs.com/?{canonicalized}&Signature={urllib.parse.quote_plus(sig)}'

import requests
url = sign('DescribeDomainRecords', RRKeyWord=rr, TypeKeyWord='A')
r = requests.get(url)
records = r.json().get('DomainRecords', {}).get('Record', [])
if any(rec['Value'] == value for rec in records):
    print(f'DNS record exists: {rr}.{domain} -> {value}')
else:
    print(f'Adding DNS A record: {rr}.{domain} -> {value}')
    url = sign('AddDomainRecord', RR=rr, Type='A', Value=value, TTL='600')
    r2 = requests.get(url)
    print(f'Add: {r2.status_code} RecordId={r2.json().get(\"RecordId\", \"?\")}')
"
        env:
          AK_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          AK_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          DOMAIN: ${{ env.DOMAIN }}
          RR: ${{ env.APP_NAME }}
          VALUE: ${{ env.ECS_IP }}

      - name: Verify deployment
        run: |
          sleep 5
          curl -f "http://${ECS_IP}:${APP_PORT}/" && echo "OK" || echo "FAIL"
