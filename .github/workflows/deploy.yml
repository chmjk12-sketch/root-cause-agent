name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: root-cause-agent
  APP_PORT: "3003"
  REGISTRY_URL: crpi-2hhvyuuzflfxsyey.cn-beijing.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: chmjk67
  DOMAIN: chmjk67.top
  ECS_IP: 39.105.86.184

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:latest
            ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}

      - uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ env.REGISTRY_URL }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}"
            echo "Pulling $IMAGE ..."
            docker pull "$IMAGE"

            echo "Stopping old container..."
            docker stop ${{ env.APP_NAME }} 2>/dev/null || true
            docker rm ${{ env.APP_NAME }} 2>/dev/null || true

            echo "Starting new container..."
            docker run -d --name ${{ env.APP_NAME }} \
              -p ${{ env.APP_PORT }}:80 \
              --restart always \
              --network caddy-net \
              -e AI_API_KEY="${{ secrets.AI_API_KEY }}" \
              -e AI_API_BASE="${{ secrets.AI_API_BASE }}" \
              -e AI_DEFAULT_MODEL="${{ secrets.AI_DEFAULT_MODEL }}" \
              -e NOTION_TOKEN="${{ secrets.NOTION_TOKEN }}" \
              -e NOTION_PARENT_PAGE_ID="${{ secrets.NOTION_PARENT_PAGE_ID }}" \
              -e SYSTEM_PROMPT_PATH=/app/system_prompt.txt \
              "$IMAGE"

            echo "Container started. Checking health..."
            sleep 3
            curl -f -s -o /dev/null "http://127.0.0.1:${{ env.APP_PORT }}/health" && echo "Health OK" || echo "Health FAIL"

      - name: Verify deployment
        run: |
          sleep 10
          curl -f -s -o /dev/null "http://${ECS_IP}:${APP_PORT}/health" && echo "OK" || echo "FAIL"
